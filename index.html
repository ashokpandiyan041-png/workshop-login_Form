<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOGIN FORM</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <h2>Web Development Workshop</h2>
    <h5>Number Of Seats Available:25</h5>
    <div class="container">
        <div class="form-container">
            <div class="left">
             <img src="./public/logo.jpeg" alt="">
            </div>
            <div class="right">
                <form action="">
                    <div class="input-box">
                    <i class="fa-solid fa-circle-user"></i><input type="text"  placeholder="Username">
                    </div>
                    <div class="input-box"><i class="fa-solid fa-envelope"></i>
                    <input type="email" placeholder="Email">
                    </div>
                    <div class="input-box"><i class="fa-solid fa-square-phone"></i>
                    <input type="tel" placeholder="Phone No">
                    </div>
                    <div class="input-box"><i class="fa-solid fa-clone"></i>
                    <input type="number" placeholder="Choose no of seats">
                    </div>
                    <div class="input-box"><i class="fa-solid fa-user-plus"></i>
                    <input type="text" placeholder="Second Name">
                    </div>
                    <div class="button">
                    <button class="submit" type="submit">Submit</button>
                    <button class="cancel" type="reset">Cancel</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
